<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LC168 - Game Quay Hũ</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e0033, #4b0082);
    color: white;
    text-align: center;
}

.container {
    margin-top: 50px;
}

h1 {
    font-size: 40px;
    color: gold;
    text-shadow: 0 0 15px yellow;
}

.slot-box {
    font-size: 60px;
    margin: 30px 0;
    letter-spacing: 20px;
}

button {
    padding: 15px 40px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: gold;
    color: black;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: orange;
}

.balance {
    margin-top: 20px;
    font-size: 20px;
}

.win {
    color: #00ff00;
    font-size: 22px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎰 LC168 QUAY HŨ 🎰</h1>
    <div class="slot-box" id="slot">🍒 🍋 🍉</div>
    <button onclick="spin()">QUAY NGAY</button>
    <div class="balance">Số dư: <span id="money">1000</span> xu</div>
    <div class="win" id="result"></div>
</div>

<script>
let money = 1000;
let icons = ["🍒","🍋","🍉","⭐","💎","7️⃣"];

function spin() {

    if(money < 50){
        document.getElementById("result").innerHTML = "Hết xu rồi!";
        return;
    }

    money -= 50;

    let a = icons[Math.floor(Math.random()*icons.length)];
    let b = icons[Math.floor(Math.random()*icons.length)];
    let c = icons[Math.floor(Math.random()*icons.length)];

    document.getElementById("slot").innerHTML = a + " " + b + " " + c;

    if(a === b && b === c){
        money += 500;
        document.getElementById("result").innerHTML = "🎉 JACKPOT +500 xu!";
    } else if(a === b || b === c || a === c){
        money += 150;
        document.getElementById("result").innerHTML = "✨ Trúng nhỏ +150 xu!";
    } else {
        document.getElementById("result").innerHTML = "Chúc bạn may mắn lần sau!";
    }

    document.getElementById("money").innerHTML = money;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slot 99% Visual Demo</title>

<style>
body{
margin:0;
background:radial-gradient(circle at top,#5a2b12,#140904);
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
}

h1{
color:gold;
text-shadow:0 0 20px gold;
}

.slot-wrapper{
width:420px;
margin:auto;
padding:15px;
border-radius:20px;
background:linear-gradient(#3b1f0f,#140904);
box-shadow:0 0 50px gold;
position:relative;
}

canvas{
background:#1a0c05;
border-radius:15px;
border:3px solid gold;
}

button{
padding:10px 25px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(gold,orange);
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px gold;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:40px;
color:gold;
text-shadow:0 0 30px gold;
}

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(0,0)}
25%{transform:translate(5px,0)}
50%{transform:translate(-5px,0)}
75%{transform:translate(5px,0)}
100%{transform:translate(0,0)}
}
</style>
</head>
<body>

<h1>🎰 WILD GOLD 99%</h1>

<div class="slot-wrapper" id="wrapper">
<canvas id="slot" width="400" height="300"></canvas>
<h3>💰 Balance: <span id="balance">1000</span></h3>
<button onclick="spin()">SPIN</button>

<div class="overlay" id="overlay">
<div id="winText"></div>
<div id="winAmount"></div>
</div>
</div>

<script>
const canvas=document.getElementById("slot");
const ctx=canvas.getContext("2d");

const rows=3, cols=5, size=80;
let balance=1000;
let bet=10;
let reels=[];
let spinning=false;
let blurAmount=0;
let particles=[];

const symbols=["A","K","Q","J","💎","🔥","🤠","⭐"];
const wild="🤠";

function randomSymbol(){
return symbols[Math.floor(Math.random()*symbols.length)];
}

function generateSpin(){
for(let c=0;c<cols;c++){
reels[c]=[];
for(let r=0;r<rows;r++){
reels[c][r]=randomSymbol();
}
}
}

function draw(){
ctx.clearRect(0,0,400,300);

ctx.filter=`blur(${blurAmount}px)`;

for(let c=0;c<cols;c++){
for(let r=0;r<rows;r++){
ctx.strokeStyle="gold";
ctx.strokeRect(c*size,r*size,size,size);

ctx.font="40px Arial";
ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.fillStyle="white";
ctx.fillText(reels[c][r],c*size+size/2,r*size+size/2);
}
}

ctx.filter="none";

drawParticles();
}

function spin(){
if(spinning) return;
if(balance<bet) return alert("Hết tiền");

spinning=true;
balance-=bet;
updateUI();

let totalDuration=2000;
let start=Date.now();

function animate(){
let elapsed=Date.now()-start;

blurAmount=5;

generateSpin();
draw();

if(elapsed<totalDuration){
requestAnimationFrame(animate);
}else{
blurAmount=0;
draw();
checkWin();
spinning=false;
}
}
animate();
playSound(200);
}

function checkWin(){
let winChance=Math.random();

if(winChance>0.6){
let winAmount=Math.floor(Math.random()*200)+50;
balance+=winAmount;
showWin(winAmount);
}else{
draw();
}
updateUI();
}

function showWin(amount){
let overlay=document.getElementById("overlay");
let text=document.getElementById("winText");
let amt=document.getElementById("winAmount");

let type="BIG WIN";
if(amount>300) type="MEGA WIN";
if(amount>500) type="SUPER WIN";

text.innerText=type;

overlay.style.display="flex";

let current=0;
let interval=setInterval(()=>{
current+=Math.ceil(amount/40);
amt.innerText="💰 "+current;
if(current>=amount){
clearInterval(interval);
screenShake();
createParticles();
setTimeout(()=>overlay.style.display="none",2500);
}
},30);
}

function screenShake(){
let wrapper=document.getElementById("wrapper");
wrapper.classList.add("shake");
setTimeout(()=>wrapper.classList.remove("shake"),400);
}

function createParticles(){
for(let i=0;i<120;i++){
particles.push({
x:200,
y:150,
dx:(Math.random()-0.5)*10,
dy:(Math.random()-0.5)*10,
life:60
});
}
}

function updateParticles(){
particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;
p.life--;
});
particles=particles.filter(p=>p.life>0);
}

function drawParticles(){
updateParticles();
particles.forEach(p=>{
ctx.fillStyle="gold";
ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fill();
});
}

function updateUI(){
document.getElementById("balance").innerText=balance;
}

function playSound(freq){
let audioCtx=new (window.AudioContext||window.webkitAudioContext)();
let osc=audioCtx.createOscillator();
osc.type="square";
osc.frequency.value=freq;
osc.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+0.1);
}

generateSpin();
draw();
</script>

</body>
</html>
